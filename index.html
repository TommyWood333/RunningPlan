<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Tom Wood — HM Plan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #f1f5f9; --muted: #64748b;
      --green: #4ade80; --amber: #fbbf24; --blue: #93c5fd; --red: #f87171;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .sticky { position: sticky; top: 0; z-index: 20; background: var(--bg); }
    .content { flex: 1; overflow-y: auto; padding-bottom: 20px; }
    button { font-family: inherit; cursor: pointer; border: none; } button:active { opacity: 0.75; }
    input, textarea { font-family: inherit; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 8px; font-size: 16px; outline: none; width: 100%; }
    input:focus, textarea:focus { border-color: var(--green); }
    .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; overflow: hidden; }
    .card.hl { border-color: rgba(74, 222, 128, 0.33); }
    .card-head { padding: 12px 14px; cursor: pointer; user-select: none; }
    .card-head.rest { cursor: default; opacity: 0.65; }
    .card-form { padding: 0 14px 14px; border-top: 1px solid var(--border); }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
    .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; font-size: 13px; border-radius: 8px; }
    .btn-save { background: var(--green); color: #052e16; border: none; padding: 8px 16px; font-size: 13px; font-weight: 700; border-radius: 8px; }
    .btn-strava { background: var(--blue); color: #082f49; border: none; padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; }
    .tab-bar { display: flex; border-top: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 10px 4px 8px; background: none; border: none; color: var(--muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; }
    .tab-btn.on { color: var(--green); }
    .stat-card { background: var(--surface); border-radius: 8px; padding: 12px 14px; border: 1px solid var(--border); }
    .info-block { background: var(--surface); border-radius: 12px; padding: 14px; border: 1px solid var(--border); margin-bottom: 12px; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .phase-banner { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .strava-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 4px; background: var(--blue); color: #082f49; margin-left: 4px; }
    .week-nav { display: flex; align-items: center; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 8px; }
    .nav-btn { width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; padding: 0; cursor: pointer; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .race-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .race-item:last-child { border-bottom: none; }
    .race-name { font-size: 13px; font-weight: 500; }
    .race-date { font-size: 10px; color: var(--muted); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const STRAVA_CLIENT_ID = "246912";
    const STRAVA_REDIRECT = "https://testversionrunningplan.netlify.app/.netlify/functions/strava-callback";

    function stravaAuthUrl() {
      return "https://www.strava.com/oauth/authorize?client_id=" + STRAVA_CLIENT_ID +
        "&redirect_uri=" + encodeURIComponent(STRAVA_REDIRECT) + "&response_type=code&scope=activity:read,read";
    }

    function syncStrava() {
      const token = localStorage.getItem("tw-hm-strava-token");
      if (!token) return;
      const MAY_1_2026 = 1746086400;
      fetch('https://www.strava.com/api/v3/athlete/activities?after=' + MAY_1_2026 + '&per_page=200', {
        headers: {'Authorization': 'Bearer ' + token}
      })
      .then(r => {
        if (!r.ok) {
          console.log('Strava API error:', r.status);
          return r.json().then(e => { throw e; });
        }
        return r.json();
      })
      .then(acts => {
        console.log('Strava response:', acts);
        if (!Array.isArray(acts)) {
          console.log('Response is not array');
          return;
        }
        let synced = 0;
        acts.filter(a => a.type === 'Run').forEach(a => {
          const d = new Date(a.start_date);
          const dateStr = d.toLocaleDateString("en-US", {month:"short", day:"numeric"});
          const logs = JSON.parse(localStorage.getItem("tw-hm-v1") || "{}");
          if (!logs[dateStr] || !logs[dateStr].done) {
            logs[dateStr] = {
              km: Math.round((a.distance / 1000) * 10) / 10,
              mins: Math.round(a.moving_time / 60),
              hr: a.average_heartrate ? Math.round(a.average_heartrate) : null,
              done: true
            };
            synced++;
          }
          localStorage.setItem("tw-hm-v1", JSON.stringify(logs));
        });
        console.log('Synced ' + synced + ' activities');
        location.reload();
      })
      .catch(e => console.log('Strava error:', e));
    }

    function handleOAuthCallback() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("strava_token");
      const athleteName = params.get("athlete_name");
      if (token) {
        localStorage.setItem("tw-hm-strava-token", token);
        localStorage.setItem("tw-hm-strava-athlete", athleteName || "");
        window.history.replaceState({}, "", "/");
        syncStrava();
      }
    }

    const SEED = {
      "May 7":{km:5,mins:30,hr:138,done:true},
      "May 10":{km:18,mins:90,hr:152,done:true},
      "May 11":{km:6.4,mins:33,hr:148,done:true},
      "May 12":{km:9,hr:156,done:true},
      "May 14":{km:7.3,mins:40,hr:143,done:true},
      "May 16":{km:10,mins:55,hr:149,done:true}
    };

    let S = {tab:"today",logs:{...SEED},exp:null,form:{},saved:false,viewWeek:null,strava:{token:localStorage.getItem("tw-hm-strava-token"),athlete:localStorage.getItem("tw-hm-strava-athlete")}};
    const KEY = "tw-hm-v1";

    try {
      const d = localStorage.getItem(KEY);
      if (d) S.logs = Object.assign({}, SEED, JSON.parse(d));
    } catch(e) {}

    function getHRZone(hr) {
      if (hr < 135) return "Z1";
      if (hr < 145) return "Z2";
      if (hr < 156) return "Z2";
      if (hr < 168) return "Z3";
      if (hr < 180) return "Z4";
      return "Z5";
    }

    function save() {
      try { localStorage.setItem(KEY, JSON.stringify(S.logs)); } catch(e) {}
      S.saved = true;
      setTimeout(() => { S.saved = false; render(); }, 1800);
    }

    function todayStr() {
      return new Date().toLocaleDateString("en-US", {month:"short", day:"numeric"});
    }

    function daysLeft() {
      const race = new Date("2026-11-01");
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      return Math.max(0, Math.round((race - now) / 86400000));
    }

    function currentWeek() {
      const PLAN = [
        {w:1,d:"Apr 27"},{w:1,d:"Apr 28"},{w:1,d:"Apr 29"},{w:1,d:"Apr 30"},{w:1,d:"May 1"},{w:1,d:"May 2"},{w:1,d:"May 3"},
        {w:2,d:"May 4"},{w:2,d:"May 5"},{w:2,d:"May 6"},{w:2,d:"May 7"},{w:2,d:"May 8"},{w:2,d:"May 9"},{w:2,d:"May 10"},
        {w:3,d:"May 11"},{w:3,d:"May 12"},{w:3,d:"May 13"},{w:3,d:"May 14"},{w:3,d:"May 15"},{w:3,d:"May 16"},{w:3,d:"May 17"},
        {w:4,d:"May 18"},{w:4,d:"May 19"},{w:4,d:"May 20"},{w:4,d:"May 21"},{w:4,d:"May 22"},{w:4,d:"May 23"},{w:4,d:"May 24"},
        {w:5,d:"May 25"},{w:5,d:"May 26"}
      ];
      const t = todayStr();
      const x = PLAN.find(p => p.d === t);
      return x ? x.w : 3;
    }

    function openForm(date) {
      if (S.exp === date) { S.exp = null; render(); return; }
      const ex = S.logs[date] || {};
      S.form = {km: ex.km || "", mins: ex.mins || "", hr: ex.hr || "", done: ex.done || false};
      S.exp = date;
      render();
    }

    function saveEntry(date) {
      S.logs[date] = {
        km: S.form.km !== "" ? parseFloat(S.form.km) : null,
        mins: S.form.mins !== "" ? parseFloat(S.form.mins) : null,
        hr: S.form.hr !== "" ? parseFloat(S.form.hr) : null,
        done: S.form.done
      };
      S.exp = null;
      save();
      render();
    }

    const ZC = {Z1:"#93c5fd",Z2:"#4ade80",Z3:"#fbbf24",Z4:"#fb923c",Z5:"#f87171"};

    function zp(z) {
      return '<span style="display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:' + (ZC[z] || "#64748b") + ';color:#0f172a">' + z + '</span>';
    }

    function render() {
      const t = todayStr();
      const cw = currentWeek();
      const connected = S.strava.token ? true : false;

      let content = '<div style="padding:40px 20px;text-align:center;color:var(--muted)">' +
        '<div style="font-size:40px">🏃</div><p style="margin-top:12px">Half Marathon Plan</p>' +
        (connected ? '<p style="margin-top:12px;font-size:12px">Connected to Strava (' + (S.strava.athlete || 'User') + ')</p><button class="btn-strava" style="margin:10px auto; display:block" onclick="syncStrava()">Sync Activities</button>' :
          '<button class="btn-strava" style="margin:10px auto; display:block" onclick="window.location.href=\'' + stravaAuthUrl() + '\'">Connect Strava</button>') +
        '</div>';

      document.getElementById('app').innerHTML =
        '<div class="sticky"><div style="padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:500">HM Plan</div><div style="font-size:11px;color:var(--muted)">' + daysLeft() + ' days left</div></div>' +
        (S.saved ? '<span style="font-size:12px;color:var(--green);font-weight:600">Saved ✓</span>' : '') +
        '</div></div><div class="content">' + content + '</div>';
    }

    handleOAuthCallback();
    render();
  </script>
</body>
</html>
