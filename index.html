<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>Tom Wood — HM Plan</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#0d1829;--border:#334155;--text:#f1f5f9;--muted:#64748b;--green:#4ade80;--amber:#fbbf24;--red:#f87171;--blue:#93c5fd;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.sticky{position:sticky;top:0;z-index:20;background:var(--bg)}
.content{flex:1;overflow-y:auto;padding-bottom:20px}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}
button:active{opacity:.75}button:disabled{opacity:.3;cursor:default}
input,textarea{font-family:inherit;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 8px;font-size:16px;outline:none;width:100%}
input[type=number]{text-align:center;font-weight:600;-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{resize:none;line-height:1.4}
input:focus,textarea:focus{border-color:var(--green)}
.zone-pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap}
.card{background:var(--surface);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.card.hl{border-color:#22c55e55}
.card-head{padding:12px 14px;cursor:pointer;user-select:none}
.card-head.rest{cursor:default;opacity:.65}
.card-form{padding:0 14px 14px;border-top:1px solid var(--border)}
.metric-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 14px;font-size:13px;border-radius:8px}
.btn-save{background:var(--green);color:#052e16;border:none;padding:8px 16px;font-size:13px;font-weight:700;border-radius:8px}
.btn-strava{background:var(--blue);color:#082f49;border:none;padding:8px 14px;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer}
.tab-bar{display:flex;border-top:1px solid var(--border)}
.tab-btn{flex:1;padding:10px 4px 8px;background:none;border:none;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.tab-btn.on{color:var(--green)}
.stat-card{background:var(--surface);border-radius:8px;padding:12px 14px;border:1px solid var(--border)}
.info-block{background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border);margin-bottom:12px}
.section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.phase-banner{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.strava-badge{display:inline-block;font-size:10px;font-weight:600;padding:4px 8px;border-radius:4px;background:var(--blue);color:#082f49;margin-left:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PLAN=[{w:1,d:"Apr 27",day:"Mon",ph:"Base I",s:"Easy Run",z:"Z2",p:"5km easy"},{w:1,d:"Apr 28",day:"Tue",ph:"Base I",s:"Track",z:"Z4/Z5",p:"Track session"},{w:1,d:"Apr 29",day:"Wed",ph:"Base I",s:"REST",z:"—",p:"Rest day"},{w:1,d:"Apr 30",day:"Thu",ph:"Base I",s:"Easy + Drills",z:"Z1",p:"5km + drills"},{w:1,d:"May 1",day:"Fri",ph:"Base I",s:"Aerobic Build",z:"Z2/Z3",p:"7km progressive"},{w:1,d:"May 2",day:"Sat",ph:"Base I",s:"Race",z:"Race",p:"5 Peaks Kelso"},{w:1,d:"May 3",day:"Sun",ph:"Base I",s:"Long Run",z:"Z2",p:"12km"},{w:2,d:"May 4",day:"Mon",ph:"Base I",s:"Easy Run",z:"Z2",p:"6km easy"},{w:2,d:"May 5",day:"Tue",ph:"Base I",s:"Track",z:"Z4/Z5",p:"Track session"},{w:2,d:"May 6",day:"Wed",ph:"Base I",s:"REST",z:"—",p:"Rest day"},{w:2,d:"May 7",day:"Thu",ph:"Base I",s:"Easy + Drills",z:"Z1",p:"5km + drills"},{w:2,d:"May 8",day:"Fri",ph:"Base I",s:"Aerobic Build",z:"Z2/Z3",p:"8km progressive"},{w:2,d:"May 9",day:"Sat",ph:"Base I",s:"Strides + Easy",z:"Z2",p:"6km + strides"},{w:2,d:"May 10",day:"Sun",ph:"Base I",s:"Long Run",z:"Z2",p:"13km"},{w:3,d:"May 11",day:"Mon",ph:"Base I",s:"Easy Run",z:"Z2",p:"7km easy"},{w:3,d:"May 12",day:"Tue",ph:"Base I",s:"Track",z:"Z4/Z5",p:"Track session"},{w:3,d:"May 13",day:"Wed",ph:"Base I",s:"REST",z:"—",p:"Rest day"},{w:3,d:"May 14",day:"Thu",ph:"Base I",s:"Easy + Drills",z:"Z1",p:"6km + drills"},{w:3,d:"May 15",day:"Fri",ph:"Base I",s:"Aerobic Build",z:"Z2/Z3",p:"9km progressive"},{w:3,d:"May 16",day:"Sat",ph:"Base I",s:"Strides + Easy",z:"Z2",p:"6km + strides"},{w:3,d:"May 17",day:"Sun",ph:"Base I",s:"Long Run",z:"Z2",p:"15km"},{w:4,d:"May 18",day:"Mon",ph:"Base I",s:"Easy Run",z:"Z2",p:"5km easy"},{w:4,d:"May 19",day:"Tue",ph:"Base I",s:"Track",z:"Z4/Z5",p:"Track session"},{w:4,d:"May 20",day:"Wed",ph:"Base I",s:"REST",z:"—",p:"Rest day"},{w:4,d:"May 21",day:"Thu",ph:"Base I",s:"Easy + Drills",z:"Z1",p:"4km + drills"},{w:4,d:"May 22",day:"Fri",ph:"Base I",s:"Aerobic Build",z:"Z2/Z3",p:"6km progressive"},{w:4,d:"May 23",day:"Sat",ph:"Base I",s:"Race",z:"Race",p:"Sulphur Springs 20k"},{w:4,d:"May 24",day:"Sun",ph:"Base I",s:"Long Run",z:"Z2",p:"11km"}];

var SEED={"Apr 28":{km:7,mins:40,hr:156,done:true},"May 1":{km:7,mins:35,hr:148,done:true},"May 2":{km:21.5,mins:105,hr:180,done:true},"May 3":{done:true},"May 4":{km:7.4,mins:45,hr:143,done:true},"May 5":{km:8.5,mins:50,hr:160,done:true},"May 7":{km:5,mins:30,hr:138,done:true},"May 10":{km:18,mins:90,hr:152,done:true},"May 11":{km:6.4,mins:33,hr:148,done:true},"May 12":{km:9,hr:156,done:true},"May 14":{km:7.3,mins:40,hr:143,done:true},"May 16":{km:10,mins:55,hr:149,done:true}};

var ZC={Z1:"#93c5fd",Z2:"#4ade80","Z2/Z3":"#86efac",Z3:"#fbbf24","Z3/Z4":"#fdba74",Z4:"#fb923c","Z4/Z5":"#fca5a5",Z5:"#f87171",Race:"#c4b5fd","—":"#64748b"};

var STRAVA_CLIENT_ID="246912";
var STRAVA_REDIRECT_URI="https://incandescent-raindrop-cc5fff.netlify.app/.netlify/functions/strava-callback";

var S={tab:"today",logs:Object.assign({},SEED),exp:null,form:{},saved:false,_t:null,strava:{connected:false,token:null,athlete:null}};
var KEY="tw-hm-v1";
var STRAVA_KEY="tw-hm-strava";

(function(){try{var d=localStorage.getItem(KEY);if(d)S.logs=Object.assign({},SEED,JSON.parse(d));}catch(e){}try{var st=localStorage.getItem(STRAVA_KEY);if(st){var parsed=JSON.parse(st);S.strava=Object.assign({},S.strava,parsed);}}catch(e){}})();

function stravaAuthUrl(){var scope="read";return "https://www.strava.com/oauth/authorize?client_id="+STRAVA_CLIENT_ID+"&redirect_uri="+encodeURIComponent(STRAVA_REDIRECT_URI)+"&response_type=code&scope="+scope;}

function saveStravaAuth(){try{localStorage.setItem(STRAVA_KEY,JSON.stringify({connected:S.strava.connected,token:S.strava.token,athlete:S.strava.athlete}));}catch(e){}}

function handleOAuthCallback(){var params=new URLSearchParams(window.location.search);var token=params.get("strava_token");var athleteName=params.get("athlete_name");var athleteId=params.get("athlete_id");if(!token)return;window.history.replaceState({},"","/");S.strava.token=token;S.strava.connected=true;S.strava.athlete={name:athleteName,id:athleteId};saveStravaAuth();fetchStravaActivities();render();}

function fetchStravaActivities(){if(!S.strava.token)return;fetch("https://www.strava.com/api/v3/athlete/activities?per_page=200",{headers:{Authorization:"Bearer "+S.strava.token}}).then(function(res){if(!res.ok)throw new Error("Strava error");return res.json();}).then(function(activities){autoMatchActivities(activities);}).catch(function(e){console.error("Strava error:",e);});}

function autoMatchActivities(activities){activities.forEach(function(act){if(act.type!=="Run")return;var d=new Date(act.start_date);var dateStr=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});var existing=S.logs[dateStr];if(existing&&existing.done)return;var distKM=Math.round((act.distance/1000)*10)/10;var mins=Math.round(act.moving_time/60);var pace=mins>0?Math.round((mins/distKM)*10)/10:null;S.logs[dateStr]={km:distKM,mins:mins,hr:act.average_heartrate?Math.round(act.average_heartrate):null,pace:pace,elev:act.total_elevation_gain?Math.round(act.total_elevation_gain):null,done:true,_strava:true};});save();}

function save(){try{localStorage.setItem(KEY,JSON.stringify(S.logs));}catch(e){}S.saved=true;clearTimeout(S._t);S._t=setTimeout(function(){S.saved=false;render();},1800);}

function todayStr(){return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});}

function daysLeft(){var r=new Date("2026-11-01"),n=new Date();n.setHours(0,0,0,0);return Math.max(0,Math.round((r-n)/86400000));}

function openForm(date){if(S.exp===date){S.exp=null;render();return;}var ex=S.logs[date]||{};S.form={km:ex.km||"",mins:ex.mins||"",hr:ex.hr||"",done:ex.done||false};S.exp=date;render();}

function saveEntry(date){S.logs[date]={km:S.form.km!==""?parseFloat(S.form.km):null,mins:S.form.mins!==""?parseFloat(S.form.mins):null,hr:S.form.hr!==""?parseFloat(S.form.hr):null,done:S.form.done};S.exp=null;save();render();}

function zp(z){return '<span style="display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:'+ZC[z]+';color:#0f172a">'+z+'</span>';}

function cardHtml(x,showDay,isToday){var m=S.logs[x.d]||{},isExp=S.exp===x.d,isRest=x.s==="REST",isDone=m.done;var top="";if(showDay||isToday){top='<div style="display:flex;gap:8px;margin-bottom:4px">'+(showDay?'<span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase">'+x.day+" "+x.d.split(" ")[1]+'</span>':"")+(isToday?'<span style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase">today</span>':"")+"</div>";}var meta="";if(isDone&&!isExp&&m.km){meta='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">'+(m.km?'<span style="font-size:12px;font-weight:600;color:var(--green)">'+m.km+" km</span>":"")+(m.mins?'<span style="font-size:12px;color:var(--muted)">'+m.mins+" min</span>":"")+(m.hr?'<span style="font-size:12px;color:var(--amber)">♥ '+m.hr+"</span>":"")+(m.pace?'<span style="font-size:12px;color:var(--blue)">'+m.pace+" min/km</span>":"")+(m.elev?'<span style="font-size:12px;color:var(--amber)">'+m.elev+"m ↑</span>":"")+(m._strava?'<span class="strava-badge">Strava</span>':"")+"</div>";}var form="";if(isExp){var f=S.form;form='<div class="card-form"><div class="metric-grid"><div><label class="metric-label">KM</label><input type="number" value="'+(f.km||"")+'" placeholder="0" oninput="S.form.km=this.value" style="font-size:18px"></div><div><label class="metric-label">Mins</label><input type="number" value="'+(f.mins||"")+'" placeholder="0" oninput="S.form.mins=this.value" style="font-size:18px"></div><div><label class="metric-label">HR</label><input type="number" value="'+(f.hr||"")+'" placeholder="0" oninput="S.form.hr=this.value" style="font-size:18px"></div></div><label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;margin-bottom:10px"><input type="checkbox" '+(f.done?"checked":"")+' onchange="S.form.done=this.checked" style="width:16px;height:16px"> Mark done</label><div style="display:flex;gap:10px"><button class="btn-ghost" onclick="S.exp=null;render()">Cancel</button><button class="btn-save" onclick="saveEntry(\''+x.d+'\')">Save ✓</button></div></div>';}return'<div class="card'+(isToday?" hl":"")+'"><div class="'+(isRest?"card-head rest":"card-head")+'"'+(!isRest?' onclick="openForm(\''+x.d+'\')"':"")+">"+top+'<div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1"><div style="font-size:15px;font-weight:500">'+x.s+"</div></div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0">"+(!isRest?zp(x.z):"")+"</div></div>"+(!isRest?'<p style="margin:6px 0 0;font-size:13px;color:var(--muted)">'+x.p+"</p>":"")+meta+"</div>"+form+"</div>";}

function todayView(){var t=todayStr(),x=PLAN.find(function(p){return p.d===t;});if(!x)return'<div style="padding:40px 20px;text-align:center;color:var(--muted)"><div style="font-size:40px">🗓️</div><p style="margin-top:12px">Today is outside the plan</p></div>';var upcoming=PLAN.filter(function(p){return p.d!==t&&!S.logs[p.d]&&p.s!=="REST";}).slice(0,3);return'<div class="phase-banner"><div><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase">Week '+x.w+'</div><div style="font-size:13px;font-weight:500">'+x.ph+'</div></div><div style="text-align:right"><div style="font-size:28px;font-weight:600;line-height:1">'+daysLeft()+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">days to go</div></div></div><div style="padding:14px 16px">'+(S.strava.connected?'<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-radius:8px;margin-bottom:10px;font-size:12px;border:1px solid var(--green)"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div>Connected to Strava'+(S.strava.athlete&&S.strava.athlete.name?" ("+S.strava.athlete.name+")":"")+'</div>':"")+' <div class="section-label">Today</div>'+cardHtml(x,false,true)+(upcoming.length?'<div class="section-label" style="margin-top:14px">This week</div>'+upcoming.map(function(p){return cardHtml(p,true,false);}).join(""):"")+'</div>';}

function logView(){var html='<div style="padding:16px"><div class="section-label">Logged runs</div>';PLAN.forEach(function(p){var log=S.logs[p.d];if(log&&log.done){html+=cardHtml(p,true,false);}});html+="</div>";return html;}

function statsView(){var allDone=PLAN.filter(function(p){return S.logs[p.d]&&S.logs[p.d].done;});var totalKM=allDone.reduce(function(s,p){return s+(S.logs[p.d].km||0);},0);return'<div style="padding:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px"><div class="stat-card"><div style="font-size:24px;font-weight:600;color:var(--green)">'+totalKM.toFixed(1)+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:4px">Total KM</div></div><div class="stat-card"><div style="font-size:24px;font-weight:600">'+allDone.length+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:4px">Sessions</div></div></div><div class="info-block"><div class="section-label">HR Zones</div><div style="font-size:12px"><p style="margin-bottom:8px"><strong>Z1:</strong> Recovery &lt;135 bpm</p><p style="margin-bottom:8px"><strong>Z2:</strong> Easy 145-155 bpm</p><p style="margin-bottom:8px"><strong>Z3:</strong> Aerobic 156-167 bpm</p><p style="margin-bottom:8px"><strong>Z4:</strong> Tempo 168-179 bpm</p><p><strong>Z5:</strong> VO2 180+ bpm</p></div></div></div>';}

var TABS=[["today","🏃","Today"],["log","📋","Log"],["stats","📊","Stats"]];

function render(){var content=S.tab==="today"?todayView():S.tab==="log"?logView():statsView();var stravaBtn=S.strava.connected?'<button class="btn-strava" onclick="S.strava={connected:false,token:null,athlete:null};localStorage.removeItem(\''+STRAVA_KEY+'\');render()">Disconnect</button>':' <button class="btn-strava" onclick="window.location.href=\''+stravaAuthUrl()+'\'">Connect Strava</button>';document.getElementById("app").innerHTML='<div class="sticky"><div style="padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:500">Half Marathon Plan</div><div style="font-size:11px;color:var(--muted)">Goal: sub-1:18 · Nov 1, 2026</div></div><div style="display:flex;gap:6px;align-items:center">'+stravaBtn+(S.saved?'<span style="font-size:12px;color:var(--green);font-weight:600">Saved ✓</span>':"")+' </div></div><div class="tab-bar">'+TABS.map(function(t){return'<button class="tab-btn'+(S.tab===t[0]?" on":"")+'" onclick="S.tab=\''+t[0]+'\';render()"><span style="font-size:20px">'+t[1]+'</span><span>'+t[2]+"</span></button>";}).join("")+"</div></div><div class=\"content\">"+content+"</div>";}

handleOAuthCallback();
render();
</script>
</body>
</html>
