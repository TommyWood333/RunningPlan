  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #f1f5f9; --muted: #64748b;
      --green: #4ade80; --amber: #fbbf24; --blue: #93c5fd; --red: #f87171;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .sticky { position: sticky; top: 0; z-index: 20; background: var(--bg); }
    .content { flex: 1; overflow-y: auto; padding-bottom: 20px; }
    button { font-family: inherit; cursor: pointer; border: none; } button:active { opacity: 0.75; }
    input, textarea { font-family: inherit; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 8px; font-size: 16px; outline: none; width: 100%; }
    input:focus, textarea:focus { border-color: var(--green); }
    .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; overflow: hidden; }
    .card.hl { border-color: rgba(74, 222, 128, 0.33); }
    .card-head { padding: 12px 14px; cursor: pointer; user-select: none; }
    .card-head.rest { cursor: default; opacity: 0.65; }
    .card-form { padding: 0 14px 14px; border-top: 1px solid var(--border); }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 12px 0; }
    .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--muted); padding: 8px 14px; font-size: 13px; border-radius: 8px; }
    .btn-save { background: var(--green); color: #052e16; border: none; padding: 8px 16px; font-size: 13px; font-weight: 700; border-radius: 8px; }
    .btn-strava { background: var(--blue); color: #082f49; border: none; padding: 8px 14px; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; }
    .tab-bar { display: flex; border-top: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 10px 4px 8px; background: none; border: none; color: var(--muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; }
    .tab-btn.on { color: var(--green); }
    .stat-card { background: var(--surface); border-radius: 8px; padding: 12px 14px; border: 1px solid var(--border); }
    .info-block { background: var(--surface); border-radius: 12px; padding: 14px; border: 1px solid var(--border); margin-bottom: 12px; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .phase-banner { padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .strava-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 4px 8px; border-radius: 4px; background: var(--blue); color: #082f49; margin-left: 4px; }
    .week-nav { display: flex; align-items: center; padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border); gap: 8px; }
    .nav-btn { width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; padding: 0; cursor: pointer; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .race-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .race-item:last-child { border-bottom: none; }
    .race-name { font-size: 13px; font-weight: 500; }
    .race-date { font-size: 10px; color: var(--muted); }
  </style>
</head>

          '</div><label style="display:block;margin-bottom:10px" onclick="event.stopPropagation()"><label class="metric-label">Notes</label><textarea placeholder="How did you feel?" oninput="S.form.notes=this.value" onclick="event.stopPropagation()" style="min-height:60px">' + (f.notes || '') + '</textarea></label>' +
          '<label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;margin-bottom:10px" onclick="event.stopPropagation()">' +
          '<input type="checkbox" ' + (f.done ? 'checked' : '') + ' onchange="S.form.done=this.checked" style="width:16px;height:16px"> Mark done</label>' +
          '<div style="display:flex;gap:10px" onclick="event.stopPropagation()"><button class="btn-ghost" onclick="S.exp=null;render()">Cancel</button>' +
          '<button class="btn-save" onclick="saveEntry(\'' + x.d + '\')">Save ✓</button></div></div>';
      }
      html += '</div>';
      return html;
    }
    function todayView() {
      const t = todayStr();
      const x = PLAN.find(p => p.d === t);
      if (!x) return '<div style="padding:40px 20px;text-align:center;color:var(--muted)"><div style="font-size:40px">🗓️</div><p style="margin-top:12px">Today is outside the plan</p></div>';
      const cw = x.w;
      return '<div class="phase-banner"><div><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase">Week ' + x.w + '</div><div style="font-size:13px;font-weight:500">' + x.ph + '</div></div><div style="text-align:right"><div style="font-size:28px;font-weight:600">' + daysLeft() + '</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase">days to go</div></div></div>' +
        '<div style="padding:14px 16px">' +
        (S.strava.connected ? '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border-radius:8px;margin-bottom:10px;font-size:12px;border:1px solid var(--green)"><div style="width:8px;height:8px;border-radius:50%;background:var(--green)"></div>Strava connected' + (S.strava.athlete?.name ? ' (' + S.strava.athlete.name + ')' : '') + '<button class="btn-ghost" style="margin-left:auto;font-size:11px;padding:4px 8px" onclick="syncStrava();event.stopPropagation()">Sync</button></div>' :
          '<button class="btn-strava" onclick="window.location.href=\'' + stravaAuthUrl() + '\'">Connect Strava</button>') +
        '<div class="section-label">Today</div>' + cardHtml(x, false, true) + '</div>';
    }
    function weekView() {
      const vw = S.viewWeek || currentWeek();
      const t = todayStr();
      const cw = currentWeek();
      const ws = PLAN.filter(p => p.w === vw);
      const runs = ws.filter(p => S.logs[p.d]?.done && p.s !== "REST");
      const km = runs.reduce((s, p) => s + (S.logs[p.d]?.km || 0), 0);
      const ph = ws[0]?.ph || "";
      return '<div class="week-nav"><button class="nav-btn" onclick="S.viewWeek=Math.max(1,(S.viewWeek||' + cw + ')-1);render()" ' +
        (vw <= 1 ? 'disabled' : '') + '>◀</button>' +
        '<div style="flex:1;text-align:center"><div style="font-size:15px;font-weight:500">Week ' + vw + (vw === cw ? ' · now' : '') + '</div><div style="font-size:12px;color:var(--muted)">' + ph + '</div></div>' +
        '<button class="nav-btn" onclick="S.viewWeek=Math.min(27,(S.viewWeek||' + cw + ')+1);render()" ' + (vw >= 27 ? 'disabled' : '') + '>▶</button></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px">' +
        '<div class="stat-card"><div style="font-size:22px;font-weight:600;color:var(--green)">' + km.toFixed(1) + '</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px">km logged</div></div>' +
        '<div class="stat-card"><div style="font-size:22px;font-weight:600">' + runs.length + '/' + ws.filter(p => p.s !== "REST").length + '</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px">sessions done</div></div></div>' +
        '<div style="padding:0 16px 16px">' + ws.map(p => cardHtml(p, true, p.d === t)).join('') + '</div>';
    }
    function logView() {
      const cw = currentWeek();
      const t = todayStr();
      let html = '<div style="padding:12px 16px">';
      for (let w = 1; w <= 27; w++) {
        const ws = PLAN.filter(p => p.w === w);
        const runs = ws.filter(p => S.logs[p.d]?.done && p.s !== "REST");
        const km = runs.reduce((s, p) => s + (S.logs[p.d]?.km || 0), 0);
        const isCurr = w === cw;
        const isPast = w < cw;
        html += '<div style="margin-bottom:' + (isCurr ? 16 : 10) + 'px"><div style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:' + (!isCurr ? 'pointer' : 'default') + '"' +
          (!isCurr ? ' onclick="S.viewWeek=' + w + ';S.tab=\'week\';render()"' : '') + '>' +
          '<div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:' + (isCurr ? 'var(--green)' : isPast ? '#374151' : '#1e293b') + '"></div>' +
          '<span style="font-size:12px;font-weight:600;color:' + (isCurr ? 'var(--text)' : 'var(--muted)') + ';text-transform:uppercase;letter-spacing:.08em">Wk ' + w + ' · ' + ws[0]?.d + (isCurr ? ' · now' : '') + '</span>' +
          (km > 0 ? '<span style="margin-left:auto;font-size:12px;font-weight:600;color:var(--green)">' + km.toFixed(1) + ' km</span>' : '') +
          '<span style="font-size:11px;color:var(--muted)">' + runs.length + '/' + ws.filter(p => p.s !== "REST").length + '</span></div>' +
          (isCurr ? ws.map(p => cardHtml(p, true, p.d === t)).join('') : '') + '</div>';
      }
      html += '</div>';
      return html;
    }
    function statsView() {
      const cw = currentWeek();
      const allDone = PLAN.filter(p => S.logs[p.d]?.done && p.s !== "REST");
      const totalKM = allDone.reduce((s, p) => s + (S.logs[p.d]?.km || 0), 0);
      let maxKM = 0;
      const chartData = [];
      for (let w = 1; w <= cw; w++) {
        const ws = PLAN.filter(p => p.w === w);
        const km = ws.filter(p => S.logs[p.d]?.done && p.s !== "REST").reduce((s, p) => s + (S.logs[p.d]?.km || 0), 0);
        chartData.push({w, km});
        if (km > maxKM) maxKM = km;
      }
      if (maxKM === 0) maxKM = 25;
      let chartHtml = '<div class="info-block"><div class="section-label">Weekly KM</div><div style="display:flex;align-items:flex-end;gap:4px;height:100px;padding:20px 0">';
      chartData.forEach(({w, km}) => {
        const h = Math.round((km / maxKM) * 80);
        chartHtml += '<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:10px;font-weight:600;color:var(--text);height:16px">' +
          (km > 0 ? km.toFixed(1) : '') + '</div><div style="width:100%;height:' + Math.max(2, h) + 'px;background:' + (km > 0 ? 'var(--green)' : 'var(--surface)') + ';border-radius:2px;opacity:' + (km > 0 ? '1' : '0.5') + '"></div>' +
          '<div style="font-size:9px;color:var(--muted);margin-top:4px">W' + w + '</div></div>';
      });
      chartHtml += '</div></div>';
      let freshData = [];
      let aeroData = [];
      for (let w = 1; w <= cw; w++) {
        const ws = PLAN.filter(p => p.w === w);
        const fresh = ws.filter(p => S.logs[p.d]?.done && S.logs[p.d]?.legFreshness).map(p => S.logs[p.d].legFreshness);
        const aero = ws.filter(p => S.logs[p.d]?.done && S.logs[p.d]?.aerobicFeel).map(p => S.logs[p.d].aerobicFeel);
        const avgFresh = fresh.length > 0 ? (fresh.reduce((s, v) => s + v, 0) / fresh.length).toFixed(1) : null;
        const avgAero = aero.length > 0 ? (aero.reduce((s, v) => s + v, 0) / aero.length).toFixed(1) : null;
        if (avgFresh) freshData.push({w, val: parseFloat(avgFresh)});
        if (avgAero) aeroData.push({w, val: parseFloat(avgAero)});
      }
      let freshHtml = '<div class="info-block"><div class="section-label">Leg Freshness</div>';
      if (freshData.length > 0) {
        freshHtml += '<div style="display:flex;align-items:flex-end;gap:4px;height:80px;padding:20px 0">';
        freshData.forEach(({w, val}) => {
          const h = Math.round((val / 10) * 60);
          freshHtml += '<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:9px;color:var(--text);height:14px">' + val + '</div><div style="width:100%;height:' + Math.max(2, h) + 'px;background:#60a5fa;border-radius:2px"></div><div style="font-size:8px;color:var(--muted);margin-top:2px">W' + w + '</div></div>';
        });
        freshHtml += '</div>';
      } else {
        freshHtml += '<div style="color:var(--muted);font-size:12px;padding:12px 0">Log runs with leg freshness to see trend</div>';
      }
      freshHtml += '</div>';
      let aeroHtml = '<div class="info-block"><div class="section-label">Aerobic Feel</div>';
      if (aeroData.length > 0) {
        aeroHtml += '<div style="display:flex;align-items:flex-end;gap:4px;height:80px;padding:20px 0">';
        aeroData.forEach(({w, val}) => {
          const h = Math.round((val / 10) * 60);
          aeroHtml += '<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="font-size:9px;color:var(--text);height:14px">' + val + '</div><div style="width:100%;height:' + Math.max(2, h) + 'px;background:#fbbf24;border-radius:2px"></div><div style="font-size:8px;color:var(--muted);margin-top:2px">W' + w + '</div></div>';
        });
        aeroHtml += '</div>';
      } else {
        aeroHtml += '<div style="color:var(--muted);font-size:12px;padding:12px 0">Log runs with aerobic feel to see trend</div>';
      }
      aeroHtml += '</div>';
      const zoneData = {Z1:0, Z2:0, Z3:0, Z4:0, Z5:0};
      allDone.forEach(p => {
        const log = S.logs[p.d];
        if (log?.hr) zoneData[getHRZone(log.hr)]++;
      });
      const totalRuns = Object.values(zoneData).reduce((s, v) => s + v, 0);
      let zoneHtml = '<div class="info-block"><div class="section-label">HR Zone Distribution</div>';
      if (totalRuns > 0) {
        zoneHtml += '<div style="margin-top:12px">';
        const zoneColors = {Z1:"#93c5fd",Z2:"#4ade80",Z3:"#fbbf24",Z4:"#fb923c",Z5:"#f87171"};
        ['Z1','Z2','Z3','Z4','Z5'].forEach(z => {
          const pct = (zoneData[z] / totalRuns * 100).toFixed(0);
          zoneHtml += '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:12px;font-weight:500">' + z + '</span><span style="font-size:11px;color:var(--muted)">' + zoneData[z] + ' runs (' + pct + '%)</span></div>' +
            '<div style="width:100%;height:8px;background:var(--surface);border-radius:4px;overflow:hidden"><div style="height:100%;width:' + pct + '%;background:' + zoneColors[z] + '"></div></div></div>';
        });
        zoneHtml += '</div>';
      } else {
        zoneHtml += '<div style="color:var(--muted);font-size:12px;padding:12px 0">Log runs with HR data to see zones</div>';
      }
      zoneHtml += '</div>';
      const races = PLAN.filter(p => p.z === "Race");
      return '<div style="padding:16px"><div class="section-label">Stats</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">' +
        '<div class="stat-card"><div style="font-size:22px;font-weight:600;color:var(--green)">' + totalKM.toFixed(1) + '</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px">Total KM</div></div>' +
        '<div class="stat-card"><div style="font-size:22px;font-weight:600">' + daysLeft() + '</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:2px">Days left</div></div>' +
        '</div>' + chartHtml + freshHtml + aeroHtml + zoneHtml +
        '<div class="info-block"><div class="section-label">Goal Races</div>' +
        races.map(r => {
          const rname = r.s.replace('🏁 ', '');
          const log = S.logs[r.d];
          return '<div class="race-item"><div><div class="race-name">' + rname + '</div><div class="race-date">' + r.d + ' · Week ' + r.w + '</div></div>' +
            (log?.done ? '<span style="color:var(--green);font-weight:600">✓</span>' : '<span style="font-size:11px;background:' + (ZC.Race || '#c4b5fd') + ';color:#1e293b;padding:2px 8px;border-radius:20px;font-weight:600">upcoming</span>') + '</div>';
        }).join('') + '</div>';
    }
    function render() {
      const t = todayStr();
      let content = '';
      if (S.tab === 'today') content = todayView();
      else if (S.tab === 'week') content = weekView();
      else if (S.tab === 'log') content = logView();
      else content = statsView();
      document.getElementById('app').innerHTML =
        '<div class="sticky"><div style="padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:14px;font-weight:500">Half Marathon Plan</div><div style="font-size:11px;color:var(--muted)">Goal: sub-1:18 · Nov 1, 2026</div></div>' +
        (S.saved ? '<span style="font-size:12px;color:var(--green);font-weight:600">Saved ✓</span>' : '') +
        '</div><div class="tab-bar">' +
        '<button class="tab-btn' + (S.tab === 'today' ? ' on' : '') + '" onclick="S.tab=\'today\';render()">🏃<span>Today</span></button>' +
        '<button class="tab-btn' + (S.tab === 'week' ? ' on' : '') + '" onclick="S.tab=\'week\';render()">📅<span>Week</span></button>' +
        '<button class="tab-btn' + (S.tab === 'log' ? ' on' : '') + '" onclick="S.tab=\'log\';render()">📋<span>Log</span></button>' +
        '<button class="tab-btn' + (S.tab === 'stats' ? ' on' : '') + '" onclick="S.tab=\'stats\';render()">📊<span>Stats</span></button>' +
        '</div></div><div class="content">' + content + '</div>';
    }
    handleOAuthCallback();
    render();
  </script>
</body>
</html>
