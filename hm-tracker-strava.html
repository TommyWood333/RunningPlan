<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HM Plan">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Tom Wood — HM Plan</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--surface:#1e293b;--surface2:#0d1829;
  --border:#334155;--text:#f1f5f9;--muted:#64748b;
  --green:#4ade80;--green-bg:#052e16;--green-text:#052e16;
  --amber:#fbbf24;--amber-bg:#292524;
  --red:#f87171;--red-bg:#450a0a;
  --blue:#93c5fd;--blue-bg:#082f49;
  --purple:#c4b5fd;--purple-bg:#2e1065;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.sticky{position:sticky;top:0;z-index:20;background:var(--bg)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button:active{opacity:.75}
button:disabled{opacity:.3;cursor:default}
input,textarea{font-family:inherit;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:10px 8px;font-size:16px;outline:none;width:100%}
input[type=number]{text-align:center;font-weight:600;-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
textarea{resize:none;line-height:1.4}
input:focus,textarea:focus{border-color:var(--green)}
.zone-pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.05em;white-space:nowrap}
.card{background:var(--surface);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.card.hl{border-color:#22c55e55}
.card-head{padding:12px 14px;cursor:pointer;user-select:none;-webkit-user-select:none}
.card-head.rest{cursor:default;opacity:.65}
.card-form{padding:0 14px 14px;border-top:1px solid var(--border)}
.metric-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.metric-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:4px}
.stars{display:flex;gap:5px}
.star{width:38px;height:38px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center}
.star.on-b{background:var(--blue);border-color:var(--blue);color:var(--blue-bg);font-weight:700}
.star.on-g{background:var(--green);border-color:var(--green);color:var(--green-text);font-weight:700}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:8px 14px;font-size:13px;border-radius:8px}
.btn-save{background:var(--green);color:var(--green-text);border:none;padding:8px 16px;font-size:13px;font-weight:700;border-radius:8px}
.btn-strava{background:var(--blue);color:var(--blue-bg);border:none;padding:8px 14px;font-size:13px;font-weight:600;border-radius:8px}
.btn-strava:hover{opacity:.9}
.btn-disconnect{background:var(--red);color:white;border:none;padding:8px 14px;font-size:13px;font-weight:600;border-radius:8px}
.tab-bar{display:flex;border-top:1px solid var(--border)}
.tab-btn{flex:1;padding:10px 4px 8px;background:none;border:none;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-btn.on{color:var(--green)}
.tab-btn .ic{font-size:20px}
.stat-card{background:var(--surface);border-radius:8px;padding:12px 14px;border:1px solid var(--border)}
.info-block{background:var(--surface);border-radius:12px;padding:14px;border:1px solid var(--border);margin-bottom:12px}
.section-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:70px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar{width:100%;border-radius:2px 2px 0 0;background:var(--surface2)}
.bar.cur{background:var(--green)}
.bar-lbl{font-size:9px;color:var(--muted)}
.week-nav{display:flex;align-items:center;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px}
.nav-btn{width:36px;height:36px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0}
.phase-banner{padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.strava-badge{display:inline-block;font-size:10px;font-weight:600;padding:4px 8px;border-radius:4px;background:var(--blue);color:var(--blue-bg);margin-left:4px}
.strava-status{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface);border-radius:8px;margin-bottom:10px;font-size:12px}
.strava-status.connected{border:1px solid #4ade80}
.strava-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
</style>
</head>

const STRAVA_CLIENT_ID="246912";
const STRAVA_REDIRECT_URI="https://incandescent-raindrop-cc5fff.netlify.app/.netlify/functions/strava-callback";

function stravaAuthUrl(){
  const scope="read";
  return `https://www.strava.com/oauth/authorize?client_id=${STRAVA_CLIENT_ID}&redirect_uri=${encodeURIComponent(STRAVA_REDIRECT_URI)}&response_type=code&scope=${scope}`;
}

function saveStravaAuth(){
  try{
    localStorage.setItem(STRAVA_KEY,JSON.stringify({connected:S.strava.connected,token:S.strava.token,athlete:S.strava.athlete}));
  }catch(e){}
}

function disconnectStrava(){
  S.strava={connected:false,token:null,athlete:null,syncing:false};
  localStorage.removeItem(STRAVA_KEY);
  render();
}

async function fetchStravaActivities(){
  if(!S.strava.token){console.log("No token");return;}
  S.strava.syncing=true;
  render();
  try{
    const res=await fetch("https://www.strava.com/api/v3/athlete/activities?per_page=200",{
      headers:{Authorization:`Bearer ${S.strava.token}`}
    });
    if(!res.ok){
      if(res.status===401){
        disconnectStrava();
      }
      return;
    }
    const activities=await res.json();
    autoMatchActivities(activities);
  }catch(e){
    console.error("Strava fetch error:",e);
  }finally{
    S.strava.syncing=false;
    render();
  }
}

function autoMatchActivities(activities){
  activities.forEach(act=>{
    if(act.type!=="Run")return;
    const d=new Date(act.start_date);
    const dateStr=d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    const existing=S.logs[dateStr];
    if(existing&&existing.done)return;
    const distKM=Math.round((act.distance/1000)*10)/10;
    const mins=Math.round(act.moving_time/60);
    const pace=mins>0?Math.round((mins/distKM)*10)/10:null;
    S.logs[dateStr]={
      ...existing,
      km:distKM,
      mins:mins,
      hr:act.average_heartrate?Math.round(act.average_heartrate):null,
      pace:pace,
      elev:act.total_elevation_gain?Math.round(act.total_elevation_gain):null,
      done:true,
      _strava:true
    };
  });
  save();
}

async function handleOAuthCallback(){
  const params=new URLSearchParams(window.location.search);
  const token=params.get("strava_token");
  const athleteName=params.get("athlete_name");
  const athleteId=params.get("athlete_id");
  const error=params.get("error");

  if(error){
    console.error("Strava error:",error);
    window.history.replaceState({},"","/");
    return;
  }

  if(!token)return;

  window.history.replaceState({},"","/");
  S.strava.token=token;
  S.strava.connected=true;
  S.strava.athlete={name:athleteName,id:athleteId};
  saveStravaAuth();
  await fetchStravaActivities();
  render();
}

function save(){try{localStorage.setItem(KEY,JSON.stringify(S.logs));}catch(e){}S.saved=true;clearTimeout(S._t);S._t=setTimeout(()=>{S.saved=false;render();},1800);}
function todayStr(){return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function daysLeft(){const r=new Date("2026-11-01"),n=new Date();n.setHours(0,0,0,0);return Math.max(0,Math.round((r-n)/86400000));}
function bw(){const b={};PLAN.forEach(x=>{if(!b[x.w])b[x.w]=[];b[x.w].push(x);});return b;}
function cw(){const t=todayStr(),x=PLAN.find(p=>p.d===t);return x?x.w:3;}
function ml(x){return{...x,...(S.logs[x.d]||{})};}
function zp(z){return`<span class="zone-pill" style="background:${ZBG[z]||ZBG["—"]};color:${ZC[z]||ZC["—"]}">${z}</span>`;}

function openForm(date){
  if(S.exp===date){S.exp=null;render();return;}
  const ex=S.logs[date]||{};
  S.form={km:ex.km??'',mins:ex.mins??'',hr:ex.hr??'',legs:ex.legs||0,aero:ex.aero||0,notes:ex.notes||'',done:ex.done||false};
  S.exp=date;render();
}
function saveEntry(date){
  S.logs[date]={km:S.form.km!==''?parseFloat(S.form.km):null,mins:S.form.mins!==''?parseFloat(S.form.mins):null,hr:S.form.hr!==''?parseFloat(S.form.hr):null,legs:S.form.legs||null,aero:S.form.aero||null,notes:S.form.notes||'',done:S.form.done};
  S.exp=null;save();render();
}

  if(showDay||isToday) top=`<div style="display:flex;gap:8px;margin-bottom:4px">${showDay?`<span style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">${x.day} ${x.d.split(" ")[1]}</span>`:''}${isToday?`<span style="font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.08em">today</span>`:''}</div>`;
  let meta='';
  if(isDone&&!isExp&&(m.km||m.mins||m.hr)) meta=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">${m.km?`<span style="font-size:12px;font-weight:600;color:var(--green)">${m.km} km</span>`:''}${m.mins?`<span style="font-size:12px;color:var(--muted)">${m.mins} min</span>`:''}${m.hr?`<span style="font-size:12px;color:var(--amber)">♥ ${m.hr}</span>`:''}${m.pace?`<span style="font-size:12px;color:var(--blue)">${m.pace} min/km</span>`:''}${m.elev?`<span style="font-size:12px;color:var(--amber)">${m.elev}m ↑</span>`:''}${m.legs?`<span style="font-size:12px;color:var(--muted)">legs ${m.legs}/5</span>`:''}${m.aero?`<span style="font-size:12px;color:var(--muted)">aero ${m.aero}/5</span>`:''}${m.notes?`<span style="font-size:12px;color:var(--muted);font-style:italic">"${m.notes.slice(0,28)}${m.notes.length>28?'...':''}"</span>`:''}${m._strava?`<span class="strava-badge">Strava</span>`:''}`;
  let form='';
  if(isExp){
    const f=S.form;
    const stars=(field,label,cls)=>`<div style="margin-bottom:12px"><div class="metric-label" style="margin-bottom:6px">${label}</div><div class="stars">${[1,2,3,4,5].map(n=>`<button class="star ${n<=(f[field]||0)?cls:''}" onclick="S.form['${field}']=${n===(f[field]||0)?0:n};render()">${n}</button>`).join('')}</div></div>`;
    form=`<div class="card-form"><div class="metric-grid">${[["km","KM","decimal"],["mins","Mins","numeric"],["hr","Avg HR","numeric"]].map(([k,l,im])=>`<div><label class="metric-label">${l}</label><input type="number" inputmode="${im}" value="${f[k]??''}" placeholder="0" oninput="S.form['${k}']=this.value" style="font-size:18px"></div>`).join('')}</div>${stars("legs","Leg freshness (1=dead, 5=springy)","on-b")}${stars("aero","Aerobic feel (1=gasping, 5=effortless)","on-g")}<textarea rows="2" placeholder="How did it feel?" oninput="S.form.notes=this.value" style="margin-bottom:10px">${f.notes||''}</textarea><div style="display:flex;align-items:center;gap:10px"><label style="display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;flex:1"><input type="checkbox" ${f.done?'checked':''} onchange="S.form.done=this.checked" style="width:16px;height:16px;accent-color:var(--green)"> Mark done</label><button class="btn-ghost" onclick="S.exp=null;render()">Cancel</button><button class="btn-save" onclick="saveEntry('${x.d}')">Save ✓</button></div></div>`;
  }
  return `<div class="card${isToday?' hl':''}"><div class="${isRest?'card-head rest':'card-head'}" ${!isRest?`onclick="openForm('${x.d}')"`:''}>${top}<div style="display:flex;justify-content:space-between;align-items:flex-start"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:15px;font-weight:500;color:${x.z==='Race'?'#c4b5fd':'var(--text)'}">${x.s}</span>${isDone?'<span style="color:var(--green);font-size:14px">✓</span>':''}</div></div><div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px">${!isRest?zp(x.z):''}${!isRest?`<span style="font-size:12px;color:var(--muted)">${isExp?'▲':'▼'}</span>`:''}</div></div>${!isRest?`<p style="margin:6px 0 0;font-size:13px;color:var(--muted);line-height:1.4">${x.p}</p>`:``}${meta}</div>${form}</div>`;
}

function todayView(){
  const t=todayStr(),x=PLAN.find(p=>p.d===t);
  if(!x) return`<div style="padding:40px 20px;text-align:center;color:var(--muted)"><div style="font-size:40px">🗓️</div><p style="margin-top:12px">Today (${t}) is outside the plan<br><small>Apr 27 – Nov 1, 2026</small></p></div>`;
  const B=bw(),CW=cw(),upcoming=(B[CW]||[]).filter(p=>p.d!==t&&!S.logs[p.d]?.done&&p.s!=='REST').slice(0,3);
  const stravaStatus=S.strava.connected?`<div class="strava-status connected"><div class="strava-dot"></div>Connected to Strava${S.strava.athlete?.name?` (${S.strava.athlete.name})`:''}</div>`:S.strava.syncing?`<div class="strava-status"><div class="strava-dot" style="background:var(--amber);animation:pulse 1.5s infinite"></div>Syncing with Strava...</div>`:`;
  return`<div class="phase-banner"><div><div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Week ${x.w} of 27</div><div style="font-size:13px;font-weight:500;color:${PC[x.ph]||'var(--text)'}">${x.ph}</div></div><div style="text-align:right"><div style="font-size:28px;font-weight:600;line-height:1">${daysLeft()}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">days to go</div></div></div><div style="padding:14px 16px">${stravaStatus}<div class="section-label">Today</div>${cardHtml(x,false,true)}${upcoming.length?`<div class="section-label" style="margin-top:14px">Also this week</div>${upcoming.map(p=>cardHtml(p,true,false)).join('')}`:''}</div>`;
}

function weekView(){
  const B=bw(),aw=S.vw??cw(),CW=cw(),t=todayStr(),ws=B[aw]||[],ph=ws.find(p=>p.ph)?.ph||'';
  const runs=ws.filter(p=>S.logs[p.d]?.done&&p.s!=='REST'),km=runs.reduce((s,p)=>s+(S.logs[p.d]?.km||0),0);
  return`<div class="week-nav"><button class="nav-btn" onclick="S.vw=Math.max(1,(S.vw??${CW})-1);render()" ${aw<=1?'disabled':''}>◀</button><div style="flex:1;text-align:center"><div style="font-size:15px;font-weight:500">Week ${aw}${aw===CW?' · now':''}</div><div style="font-size:12px;font-weight:500;color:${PC[ph]||'var(--muted)'}">${ph}</div></div><button class="nav-btn" onclick="S.vw=Math.min(27,(S.vw??${CW})+1);render()" ${aw>=27?'disabled':''}>▶</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px"><div class="stat-card"><div style="font-size:22px;font-weight:600;color:var(--green)">${km.toFixed(1)}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px">km logged</div></div><div class="stat-card"><div style="font-size:22px;font-weight:600">${runs.length}/${ws.filter(p=>p.s!=='REST').length}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:2px">sessions done</div></div></div><div style="padding:0 16px 16px">${ws.map(p=>cardHtml(p,true,p.d===t)).join('')}</div>`;
}

function logView(){
  const B=bw(),CW=cw(),t=todayStr();
  return`<div style="padding:12px 16px">${Object.keys(B).map(Number).sort((a,b)=>a-b).map(wk=>{
    const ws=B[wk],isCurr=wk===CW,isPast=wk<CW,runs=ws.filter(p=>S.logs[p.d]?.done&&p.s!=='REST'),km=runs.reduce((s,p)=>s+(S.logs[p.d]?.km||0),0);
    return`<div style="margin-bottom:${isCurr?16:10}px"><div style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:${!isCurr?'pointer':'default'}" ${!isCurr?`onclick="S.vw=${wk};S.tab='week';render()"`:''}}><div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${isCurr?'var(--green)':isPast?'#374151':'#1e293b'}"></div><span style="font-size:12px;font-weight:600;color:${isCurr?'var(--text)':'var(--muted)'};text-transform:uppercase;letter-spacing:.08em">Wk ${wk} · ${ws[0]?.d}${isCurr?' · now':''}</span>${km>0?`<span style="margin-left:auto;font-size:12px;font-weight:600;color:var(--green)">${km.toFixed(1)} km</span>`:'<span style="margin-left:auto"></span>'}<span style="font-size:11px;color:var(--muted)">${runs.length}/${ws.filter(p=>p.s!=='REST').length}</span></div>${isCurr?ws.map(p=>cardHtml(p,true,p.d===t)).join(''):''}${isPast&&runs.length?runs.map(p=>cardHtml(p,true,false)).join(''):''}${isPast&&!runs.length?`<div style="font-size:12px;color:var(--muted);padding-left:16px;font-style:italic">No runs logged</div>`:''}${!isCurr&&!isPast?`<div style="font-size:12px;color:var(--muted);padding-left:16px">${ws.filter(p=>p.s!=='REST').map(p=>p.s).join(' · ').slice(0,70)}</div>`:''}</div>`;
  }).join('')}</div>`;
}

function statsView(){
  const B=bw(),CW=cw(),allDone=PLAN.filter(p=>S.logs[p.d]?.done&&p.s!=='REST'),totalKM=allDone.reduce((s,p)=>s+(S.logs[p.d]?.km||0),0);
  const chartWks=Object.keys(B).map(Number).filter(wk=>wk<=CW).map(wk=>{const km=B[wk].filter(p=>S.logs[p.d]?.done&&p.s!=='REST').reduce((s,p)=>s+(S.logs[p.d]?.km||0),0);return{wk,km};});
  const maxKM=Math.max(...chartWks.map(d=>d.km),1);
  const races=PLAN.filter(p=>p.z==='Race');
  return`<div style="padding:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">${[["Total KM",totalKM.toFixed(1),"var(--green)"],["Sessions",allDone.length,"var(--text)"],["Days to go",daysLeft(),"var(--amber)"],["Week",`${CW}/27`,"var(--blue)"]].map(([l,v,c])=>`<div class="stat-card"><div style="font-size:24px;font-weight:600;color:${c};line-height:1">${v}</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:4px">${l}</div></div>`).join('')}</div>${chartWks.some(d=>d.km>0)?`<div class="info-block"><div class="section-label">Weekly KM</div><div class="bar-chart">${chartWks.map(({wk,km})=>`<div class="bar-col"><div class="bar${wk===CW?' cur':''}" style="height:${km>0?Math.max(4,Math.round((km/maxKM)*62)):0}px"></div><div class="bar-lbl">${wk}</div></div>`).join('')}</div></div>`:''}
  <div class="info-block"><div class="section-label">Races</div>${races.map(p=>{const l=S.logs[p.d];return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;opacity:${l?.done?'0.6':'1'}"><div><div style="font-size:13px;font-weight:500">${p.s.replace('🏁 ','')}</div><div style="font-size:11px;color:var(--muted)">${p.d} · Wk ${p.w}</div></div>${l?.done?`<span style="font-size:12px;font-weight:600;color:var(--green)">${l.km?l.km+' km':''} ✓</span>`:`<span style="font-size:11px;background:${ZBG.Race};color:${ZC.Race};padding:2px 8px;border-radius:20px">upcoming</span>`}</div>`;}).join('')}</div>
  <div class="info-block"><div class="section-label">HR zone guide</div>${[["Z1","Recovery","< 135 bpm"],["Z2","Easy / base","145–155 bpm"],["Z3","Aerobic","156–167 bpm"],["Z4","Tempo / LT","168–179 bpm"],["Z5","VO2max","180–195 bpm"]].map(([z,n,r])=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">${zp(z)}<span style="font-size:13px;font-weight:500;flex:1">${n}</span><span style="font-size:12px;color:var(--muted)">${r}</span></div>`).join('')}</div>
  </div>`;
}

const TABS=[["today","🏃","Today"],["week","📅","Week"],["log","📋","Log"],["stats","📊","Stats"]];

function render(){
  const content=S.tab==='today'?todayView():S.tab==='week'?weekView():S.tab==='log'?logView():statsView();
  const stravaBtn=S.strava.connected?`<button class="btn-disconnect" onclick="disconnectStrava()">Disconnect Strava</button>`:S.strava.syncing?`<button class="btn-strava" disabled>Syncing...</button>`:`<button class="btn-strava" onclick="window.location.href='${stravaAuthUrl()}'">Connect Strava</button>`;
  document.getElementById('app').innerHTML=`
    <div class="sticky">
      <div style="padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:14px;font-weight:500">Half Marathon Plan</div><div style="font-size:11px;color:var(--muted)">Goal: sub-1:18 · Nov 1, 2026</div></div>
        <div style="display:flex;gap:6px;align-items:center">${stravaBtn}${S.saved?'<span style="font-size:12px;color:var(--green);font-weight:600">Saved ✓</span>':''}</div>
      </div>
      <div class="tab-bar">${TABS.map(([id,ic,lb])=>`<button class="tab-btn${S.tab===id?' on':''}" onclick="S.tab='${id}';render()"><span class="ic">${ic}</span><span>${lb}</span></button>`).join('')}</div>
    </div>
    <div class="content">${content}</div>`;
}
try{
  handleOAuthCallback();
  render();
}catch(e){
  document.getElementById('app').innerHTML='<div style="padding:40px 20px;text-align:center;color:#f87171"><div style="font-size:32px">⚠️</div><p style="margin-top:12px;font-size:14px">Error: '+e.message+'</p></div>';
}
</script>
</body>
</html>
